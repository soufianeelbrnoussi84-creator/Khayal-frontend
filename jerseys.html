<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="jersey-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Atlas Lions Collection</title>
</head>
<body>
    <div class="navbar">
        <h1 class="title"><img src="pictures/jersey-title.png" alt=""></h1>
        
        <nav>
          <i class="fa-solid fa-magnifying-glass"></i>  <!-- search -->
          <i class="fa-solid fa-user"></i>              <!-- user -->
          <i class="fa-solid fa-cart-shopping"></i>     <!-- cart -->
          <i class="fa-solid fa-house"></i>  <!-- Home -->
        </nav>
    </div>
    <div class="hero">
          <h2></h2>
    </div>

    <div class="product">
        <div class="product-grid">
            <div class="product-card">
            <img src="pictures/red-morocco.png" alt="Red Morocco Jersey">
            <h3 class="product-title">Red Maroccain Jersey </h3>
            <h4 class="price">399 MAD</h4>
            <button onclick="showProduct('Red Maroccain Jersey', '399 MAD', 'pictures/red-morocco.png', '1')">QUICK ADD</button>
            </div>

        <div class="product-card">
            <img src="pictures/white_jersey.png" alt="White Morocco Jersey">
            <h3 class="product-title">White Maroccain Jersey</h3>
            <h4 class="price">399 MAD</h4>
            <button onclick="showProduct('White Maroccain Jersey', '399 MAD', 'pictures/white_jersey.png', '2')">QUICK ADD</button>
        </div>

        <div class="product-card">
            <img src="pictures/short.png" alt="red-short">
            <h3 class="product-title">Red Maroccain Short</h3>
            <h4 class="price">229 MAD</h4>
            <button onclick="showProduct('Red Maroccain Short', '229 MAD', 'pictures/short.png', '3')">QUICK ADD</button>
        </div>

        <div class="product-card">
            <img src="pictures/tracksuit-black.png" alt="tracksuit-black">
            <h3 class="product-title">Black Maroccain Tracksuit</h3>
            <h4 class="price">399 MAD</h4>
            <button onclick="showProduct('Red Maroccain Tracksuit', '399 MAD', 'pictures/tracksuit-black.png', '4')">QUICK ADD</button>
        </div>

        <div class="product-card">
            <img src="pictures/red-tracksuit.png" alt="tracksuit-red">
            <h3 class="product-title">Red Maroccain Tracksuit</h3>
            <h4 class="price">399 MAD</h4>
            <button onclick="showProduct('Red Maroccain Tracksuit', '399 MAD', 'pictures/red-tracksuit.png', '5')">QUICK ADD</button>
        </div>
        <div class="product-card">
            <img src="pictures/white-hat.png" alt="white-hat">
            <h3 class="product-title">White Maroccain Hat</h3>
            <h4 class="price">149 MAD</h4>
            <button onclick="showProduct('White Maroccain Hat', '149 MAD', 'pictures/white-hat.png', '8')">QUICK ADD</button>
        </div> 
        <div class="product-card">
            <img src="pictures/pants.png" alt="pants">
            <h3 class="product-title">Black Maroccain Pant</h3>
            <h4 class="price">399 MAD</h4>
            <button onclick="showProduct('Black Maroccain Pant', '399 MAD', 'pictures/pants.png', '7')">QUICK ADD</button>
        </div>
        <div class="product-card">
            <img src="pictures/together.png" alt="pants">
            <h3 class="product-title">Black Maroccain Tracksuit</h3>
            <h4 class="price">739 MAD</h4>
            <button onclick="showProduct('Black Maroccain Tracksuit', '739 MAD', 'pictures/together.png', '6')">QUICK ADD</button>
        </div>      
    </div>
    </div>
    <div class="footer"></div>
    <script src="jersey.js"></script>

    <div id="sidebar" class="sidebar">
        <button onclick="hideSidebar()" id="closeBtn">✕</button>
        <img id="sidebarImg" src="" alt="">
        <h2 id="sidebarName"></h2>
        <h3 id="sidebarPrice"></h3>
        <p id="selectedSize">Size: </p>
        <span id="sizeError" class="error"></span>
        <div class="size-options">
        <button class="size-btn" onclick="selectSize(this)">S</button>
        <button class="size-btn" onclick="selectSize(this)">M</button>
        <button class="size-btn" onclick="selectSize(this)">L</button>
        <button class="size-btn-big-size" onclick="selectSize(this)">XL</button>
        <button class="size-btn-big-size" onclick="selectSize(this)">2XL</button>
        <button class="size-btn-big-size" onclick="selectSize(this)">3XL</button>
        <button class="size-btn-big-size" onclick="selectSize(this)">4XL</button>
        </div>
        <div class="quantity-selector">
        <button onclick="decreaseQty()">-</button>
        <span id="quantity">1</span>
        <button onclick="increaseQty()">+</button>
        </div>
    
        <button id="orderBtn" onclick="orderNow()">Order Now</button>

        
    </div>

</body>
</html>
